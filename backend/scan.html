<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Attendance</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root {
      --primary: #2563eb;
      --success: #16a34a;
      --danger: #dc2626;
      --gray: #64748b;
      --bg: #f1f5f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h2 {
      margin: 0;
      font-weight: 600;
      font-size: 20px;
    }

    .header p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--gray);
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    #reader {
      margin-top: 20px;
      display: none;
      border-radius: 16px;
      overflow: hidden;
    }

    .status {
      margin-top: 18px;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .success {
      background: #dcfce7;
      color: var(--success);
    }

    .error {
      background: #fee2e2;
      color: var(--danger);
    }

    .loading {
      background: #e0f2fe;
      color: var(--primary);
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="card">
      <div class="header">
        <h2>QR Attendance</h2>
        <p>Scan QR untuk melakukan presensi</p>
      </div>

      <input id="user_id" placeholder="User ID" />
      <input id="device_id" placeholder="Device ID" />

      <button onclick="startScan()">Mulai Scan</button>

      <div id="reader"></div>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const baseUrl =
      "https://script.google.com/macros/s/AKfycbwRWRN2Nn3vvDzWNO8IYinc449oZcnyCCC3NJmzqTX0gSnOyFpEzo4Giap3nYEwg39M4g/exec";

    let scanner;

    function startScan() {
      if (!validate()) {
        showStatus("Lengkapi User ID dan Device ID terlebih dahulu", "error");
        return;
      }

      document.getElementById("reader").style.display = "block";
      showStatus("Scanning...", "loading");

      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        async (decodedText) => {
          await scanner.stop();
          document.getElementById("reader").style.display = "none";
          sendCheckIn(decodedText);
        },
      );
    }

    function validate() {
      return (
        document.getElementById("user_id").value.trim() &&
        document.getElementById("device_id").value.trim()
      );
    }

    async function sendCheckIn(token) {
      showStatus("Mengirim data...", "loading");

      const data = {
        user_id: document.getElementById("user_id").value.trim(),
        device_id: document.getElementById("device_id").value.trim(),
        qr_token: token,
        timestamp: new Date().toISOString(),
      };

      try {
        const res = await fetch(baseUrl + "?path=presence/checkin", {
          method: "POST",
          redirect: "follow",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(data),
        });

        const result = await res.json();

        if (result.ok) {
          showStatus("Presensi berhasil ✅ (" + result.data.course_id + " - " + result.data.session_id + ")", "success");
        } else {
          showStatus("Gagal: " + result.error, "error");
        }
      } catch (e) {
        showStatus("Server tidak dapat dihubungi", "error");
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById("status");
      el.innerText = msg;
      el.className = "status " + type;
      el.style.display = "block";
    }
  </script>
</body>

</html>
